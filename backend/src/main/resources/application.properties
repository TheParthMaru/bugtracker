# =============================================================================
# BugTracker — default configuration (safe to commit)
# =============================================================================
# Secrets and production values MUST NOT be committed. Use either:
#   • Environment variables (see comments below — Spring maps them automatically), or
#   • A local-only file: src/main/resources/application-local.properties (gitignored)
#
# See backend/application-local.properties.example — copy values into
# src/main/resources/application-local.properties for machine-specific overrides (gitignored).
# =============================================================================

# === Logging Configuration ===
logging.file.path=logs

# ===============================
# = Data Source Configuration =
# ===============================
# Env: SPRING_DATASOURCE_URL, SPRING_DATASOURCE_USERNAME, SPRING_DATASOURCE_PASSWORD
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/bugtrackerdb}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:bugtracker}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:bugtracker}

# ===============================
# = JPA Configuration =
# ===============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:true}
spring.jpa.properties.hibernate.format_sql=true

# ===============================
# = Flyway Configuration =
# ===============================
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# ===============================
# = Application Info =
# ===============================
spring.application.name=bug-tracker

# ===============================
# = Spring Data Configuration =
# ===============================
spring.data.web.pageable.default-page-size=20
spring.data.web.pageable.max-page-size=100

# ===============================
# = JWT Configuration =
# ===============================
# Env: JWT_SECRET_KEY (min 32 characters for HS256), JWT_EXPIRATION_MS
jwt.secret-key=${JWT_SECRET_KEY:local-development-only-min-32-chars-secret!!}
jwt.expiration-ms=${JWT_EXPIRATION_MS:604800000}

# ===============================
# = File Upload Configuration =
# ===============================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
spring.servlet.multipart.enabled=true
spring.servlet.multipart.file-size-threshold=2KB

# ===============================
# = Notification / Resend Email =
# ===============================
# Real email: set RESEND_ENABLED=true and RESEND_API_KEY (and verify domain in Resend).
# Env: RESEND_ENABLED, RESEND_API_KEY, RESEND_FROM_EMAIL, RESEND_FROM_NAME
resend.enabled=${RESEND_ENABLED:false}
resend.api.key=${RESEND_API_KEY:}
resend.from.email=${RESEND_FROM_EMAIL:onboarding@resend.dev}
resend.from.name=${RESEND_FROM_NAME:BugTracker Notifications}
resend.api.url=${RESEND_API_URL:https://api.resend.com}

notification.email.enabled=${NOTIFICATION_EMAIL_ENABLED:true}
notification.email.mock-mode=${NOTIFICATION_EMAIL_MOCK_MODE:true}
notification.email.batch-size=10
notification.email.retry-attempts=3

# ===============================
# = Frontend URL Configuration =
# ===============================
# Used in password-reset and notification links. Must match your deployed frontend (https://...).
# Env: APP_FRONTEND_BASE_URL
app.frontend.base-url=${APP_FRONTEND_BASE_URL:http://localhost:5173}
app.frontend.base-path=/api/bugtracker/v1
app.frontend.routes.projects=/projects
app.frontend.routes.bugs=/bugs
app.frontend.routes.teams=/teams

# ===============================
# = Actuator (avoid exposing /env or /metrics publicly in production) =
# ===============================
management.endpoints.web.exposure.include=${MANAGEMENT_ENDPOINTS_WEB_EXPOSURE_INCLUDE:health,info}
management.endpoint.health.enabled=true
management.endpoint.health.show-details=${MANAGEMENT_ENDPOINT_HEALTH_SHOW_DETAILS:never}
management.endpoints.web.base-path=/actuator
