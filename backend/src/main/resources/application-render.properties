# Activated on Render via SPRING_PROFILES_ACTIVE=render (see Dockerfile)
# Logback: logback-spring.xml "render" profile = console only (full logs in Render UI)

spring.jpa.show-sql=false
spring.jmx.enabled=false

# Tomcat does not accept connections until the context refresh finishes. Defer non-critical beans
# so the HTTP port opens sooner (Render port scan / health checks). Flyway/DataSource stay eager.
spring.main.lazy-initialization=true

# Flyway + JPA run before Tomcat opens PORT; a stuck DB connection looks like "no open ports"
# until Render times out. Cap driver-level waits so logs show a failure instead of a 15m hang.
spring.datasource.hikari.connection-timeout=25000
spring.datasource.hikari.data-source-properties.connectTimeout=15
spring.datasource.hikari.data-source-properties.socketTimeout=60
spring.flyway.connect-retries=2
spring.flyway.connect-retries-interval=5s
